<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Early Risk Analysis of Type 1 Diabetes</title>
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                darkTeal: '#083A40',
                primaryTeal: '#0F6C74',
                lightTeal: '#3AB8C1',
                accentTeal: '#2FA5AD',
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="bg-white" data-server-auth="{{ 'true' if session.get('user') else 'false' }}" data-user-name="{{ session.get('user').get('name') if session.get('user') else '' }}" data-user-email="{{ session.get('user').get('email') if session.get('user') else '' }}">
    <div id="navbar"></div>

    <main class="min-h-screen bg-white relative overflow-hidden flex items-center justify-center">
      <div class="absolute inset-0 pointer-events-none">
        <div class="absolute inset-x-0 top-0 h-[360px] bg-gradient-to-br from-[#0F6C74] via-[#147E86] to-[#3AB8C1]"></div>
        <div
          class="absolute inset-x-0 top-0 h-[360px] opacity-[0.07]"
          style="background-image: linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px); background-size: 70px 70px;"
        ></div>
        <div class="absolute inset-x-0 top-[260px] h-48 bg-gradient-to-b from-transparent to-white"></div>

        <!-- Soft watermark medical icons -->
        <div class="absolute top-24 right-[8%] opacity-10 animate-float-slow">
          <svg class="w-24 h-24 text-white" fill="none" stroke="currentColor" viewBox="0 0 80 80" stroke-width="2">
            <polyline points="8,46 20,46 28,28 38,60 46,36 56,52 66,40 72,40" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="20" cy="46" r="3" />
            <circle cx="38" cy="60" r="3" />
            <circle cx="56" cy="52" r="3" />
          </svg>
        </div>
        <div class="absolute top-16 left-[12%] opacity-10 animate-float" style="animation-delay: 1s;">
          <svg class="w-20 h-20 text-white" fill="none" stroke="currentColor" viewBox="0 0 64 64" stroke-width="2">
            <rect x="10" y="10" width="44" height="44" rx="10" ry="10" />
            <path d="M32 18v28M18 32h28" stroke-linecap="round" />
          </svg>
        </div>
        <div class="absolute bottom-20 left-[18%] opacity-10 animate-float-slow" style="animation-delay: 1.8s;">
          <svg class="w-24 h-24 text-[#E6F7F9]" fill="none" stroke="currentColor" viewBox="0 0 72 72" stroke-width="2">
            <path d="M18 28l18-12 18 12-18 12z" stroke-linejoin="round" />
            <path d="M18 44l18-12 18 12-18 12z" stroke-linejoin="round" />
            <path d="M36 16v12M36 32v12M36 48v10" />
          </svg>
        </div>
      </div>

      <div class="relative z-10 w-full max-w-md px-4 pt-20 pb-8">
        <div class="animate-slide-up">
          <div class="bg-white/96 backdrop-blur-xl border border-white/80 rounded-[28px] p-8 shadow-soft">
            <div class="flex justify-center mb-6">
              <div class="relative">
                <div class="absolute inset-0 bg-[#0F6C74]/10 rounded-full blur-xl scale-150"></div>
                <div class="relative bg-gradient-to-br from-[#F5FBFC] to-[#E8F5F7] p-4 rounded-full border border-[#0F6C74]/20">
                  <img src="https://i.ebayimg.com/images/g/SCsAAOSwOwJjapHJ/s-l400.jpg" alt="Caduceus Logo" class="w-14 h-14 rounded-full object-cover" />
                </div>
              </div>
            </div>

            <div class="text-center mb-8">
              <h2 class="text-3xl font-bold text-[#083A40] mb-1">Create Account</h2>
              <p class="text-slate-600 text-sm">Join the clinical research platform</p>
            </div>

            <form id="register-form" class="space-y-4" method="post" action="{{ url_for('register') }}" data-server-post="true">
              <div>
                <label for="name" class="block text-sm font-medium text-[#374151] mb-2">Full Name</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                  </div>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    required
                    class="w-full bg-white border border-slate-200 rounded-xl py-3 pl-12 pr-4 text-[#111827] placeholder-slate-400 focus:outline-none focus:border-[#0F6C74] focus:ring-4 focus:ring-[#0F6C74]/12 transition-all duration-300"
                    placeholder="John Doe"
                  />
                </div>
              </div>

              <div>
                <label for="email" class="block text-sm font-medium text-[#374151] mb-2">Email Address</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                    </svg>
                  </div>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    class="w-full bg-white border border-slate-200 rounded-xl py-3 pl-12 pr-4 text-[#111827] placeholder-slate-400 focus:outline-none focus:border-[#0F6C74] focus:ring-4 focus:ring-[#0F6C74]/12 transition-all duration-300"
                    placeholder="you@example.com"
                  />
                </div>
              </div>

              <div>
                <label for="password" class="block text-sm font-medium text-[#374151] mb-2">Password</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                  </div>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full bg-white border border-slate-200 rounded-xl py-3 pl-12 pr-4 text-[#111827] placeholder-slate-400 focus:outline-none focus:border-[#0F6C74] focus:ring-4 focus:ring-[#0F6C74]/12 transition-all duration-300"
                    placeholder="********"
                  />
                </div>
              </div>

              <div>
                <label for="confirmPassword" class="block text-sm font-medium text-[#374151] mb-2">Confirm Password</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                    </svg>
                  </div>
                  <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    required
                    class="w-full bg-white border border-slate-200 rounded-xl py-3 pl-12 pr-4 text-[#111827] placeholder-slate-400 focus:outline-none focus:border-[#0F6C74] focus:ring-4 focus:ring-[#0F6C74]/12 transition-all duration-300"
                    placeholder="********"
                  />
                </div>
              </div>

              <div id="register-error" class="{% if error %}{% else %}hidden {% endif %}bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 text-sm shadow-sm">{{ error or '' }}</div>

              <button
                type="submit"
                class="w-full py-3 bg-[#0F6C74] text-white font-semibold rounded-xl transition-all duration-300 hover:bg-[#084A52] hover:shadow-lg hover:shadow-[#0F6C74]/30 active:translate-y-0 mt-2"
              >
                Register
              </button>
            </form>

            <div class="mt-6 text-center">
              <p class="text-slate-500 text-sm">
                Already have an account?
                <a href="login.html" class="text-[#0F6C74] hover:text-[#084A52] font-medium transition-colors duration-300">Login here</a>
              </p>
            </div>
          </div>

          <p class="text-center text-slate-500 text-xs mt-6">
            Early Risk Analysis of Type 1 Diabetes - Secure Medical AI Platform
          </p>
        </div>
      </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
      window.App.initPage();
    </script>
  </body>
</html>
