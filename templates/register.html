<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Early Risk Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="min-h-screen bg-[#F5F7F8] flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-soft border border-slate-200 p-8 space-y-6">
      <div class="text-center space-y-2">
        <h1 class="text-2xl font-bold text-[#083A40]">Register</h1>
        <p class="text-sm text-slate-600">Demo registration accepts any username and password.</p>
      </div>
      <form method="post" class="space-y-4">
        <div>
          <label class="form-label" for="username">Username</label>
          <input class="form-input" id="username" name="username" type="text" required />
        </div>
        <div>
          <label class="form-label" for="password">Password</label>
          <input class="form-input" id="password" name="password" type="password" required />
        </div>
        <button type="submit" class="w-full px-4 py-3 rounded-lg bg-[#0F6C74] text-white font-semibold hover:bg-[#084A52]">Register</button>
      </form>
      <div class="text-sm text-center text-slate-600">
        Have an account? <a class="text-[#0F6C74] font-semibold" href="{{ url_for('login') }}">Login</a>
      </div>
      <div class="text-center text-sm">
        <a class="text-[#0F6C74]" href="{{ url_for('landing') }}">Back to landing</a>
      </div>
    </div>
  </body>
</html>
